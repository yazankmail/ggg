<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول المدير - Wusooly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            margin: 0; height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; background-color: #000;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.ibb.co/8LVbzyP2/1770038717427.png') no-repeat center center;
            background-size: cover; z-index: -1; filter: brightness(0.6);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 40px 30px; width: 90%; max-width: 400px;
            text-align: center; color: #fff; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { margin-top: 0; margin-bottom: 10px; font-weight: 800; font-size: 28px; }
        p { margin-bottom: 30px; color: rgba(255, 255, 255, 0.8); font-size: 14px; }

        .google-btn {
            background: white; color: #333; width: 100%; padding: 12px;
            border-radius: 12px; border: none; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; margin-top: 20px;
        }
        .google-btn:hover { background: #f1f1f1; transform: scale(1.02); }

        /* رسائل الحالة */
        #status-msg { margin-top: 20px; font-weight: bold; font-size: 14px; display: none; }
        .success { color: #4CAF50; }
        .error { color: #ff4747; }
        
        /* زر الانتقال اليدوي (يظهر عند الضرورة) */
        #manual-redirect {
            display: none; margin-top: 15px; background: #0056b3; 
            color: white; padding: 10px 20px; border-radius: 8px; 
            text-decoration: none; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="glass-card">
        <h2>أهلاً بك 👋</h2>
        <p>يرجى تسجيل الدخول للوصول إلى لوحة التحكم</p>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            الدخول كمسؤول (Google)
        </button>

        <div id="status-msg"></div>
        <a id="manual-redirect" href="./index.html">اضغط هنا للانتقال للوحة التحكم</a>

        <div style="margin-top: 30px; font-size: 12px; opacity: 0.5;">Wusooly Admin Panel</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // إضافة setPersistence و browserLocalPersistence
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const ALLOWED_ADMIN = "hmamda320@gmail.com";

        const btn = document.getElementById('google-login-btn');
        const statusMsg = document.getElementById('status-msg');
        const manualLink = document.getElementById('manual-redirect');

        function showStatus(text, type) {
            statusMsg.innerText = text;
            statusMsg.className = type;
            statusMsg.style.display = 'block';
        }

        // 1. مراقبة الحالة (تعمل فور العودة من جوجل)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email === ALLOWED_ADMIN) {
                    // نجح الدخول
                    showStatus(`أهلاً ${user.displayName.split(' ')[0]}! جاري توجيهك...`, "success");
                    btn.style.display = 'none';
                    
                    // محاولة التوجيه التلقائي
                    setTimeout(() => {
                        window.location.href = "./index.html"; 
                    }, 1500);

                    // إظهار زر يدوي احتياطاً
                    manualLink.style.display = "inline-block";
                } else {
                    // إيميل خاطئ
                    showStatus("⛔ هذا الإيميل ليس للمدير!", "error");
                    signOut(auth);
                }
            }
        });

        // 2. زر الدخول (مع تثبيت الجلسة)
        btn.addEventListener('click', () => {
            showStatus("جاري الاتصال بجوجل...", "success");
            
            // فرض حفظ تسجيل الدخول في المتصفح
            setPersistence(auth, browserLocalPersistence)
                .then(() => {
                    return signInWithRedirect(auth, provider);
                })
                .catch((error) => {
                    showStatus("خطأ: " + error.message, "error");
                });
        });

        // 3. التقاط أخطاء الـ Redirect إن وجدت
        getRedirectResult(auth).catch((error) => {
            showStatus("فشل الدخول: " + error.message, "error");
        });
    </script>

</body>
</html>
