<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات - Wusooly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #5c6bc0; 
            --bg-light: #f3f4f6;
            --white: #ffffff;
            --text-dark: #333;
            --sidebar-width: 260px;
            --sidebar-bg: #1e293b; 
            --sidebar-text: #cbd5e1;
            --radius: 12px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-dark); 
        }

        /* --- شاشة التحميل (مهمة جداً) --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #eee;
            border-top: 5px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* المحتوى الرئيسي (مخفي حتى التحميل) */
        #main-wrapper { display: none; height: 100%; }

        /* --- القائمة الجانبية --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--sidebar-bg);
            height: 100%; position: fixed; right: 0; top: 0;
            display: flex; flex-direction: column; color: var(--sidebar-text);
            z-index: 100; padding-top: 10px;
        }
        .logo-area { padding: 20px; text-align: center; border-bottom: 1px solid #334155; margin-bottom: 10px; }
        .logo-area h2 { margin: 0; color: #fff; }
        .nav-links { list-style: none; padding: 0 15px; flex-grow: 1; }
        .nav-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            margin-bottom: 5px; border-radius: 10px; cursor: pointer; 
            color: var(--sidebar-text); text-decoration: none; font-weight: 600;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: #334155; color: #fff; }
        .nav-item svg { width: 22px; height: 22px; }
        
        .logout-area { padding: 20px; border-top: 1px solid #334155; }
        .logout-btn { 
            width: 100%; padding: 12px; background: #ffebee; color: #d32f2f; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
        }

        /* --- المحتوى --- */
        .main-content {
            margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            height: 100%; overflow-y: auto; padding: 30px;
        }

        /* الهيدر */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title h1 { margin: 0; font-size: 24px; }
        .add-btn {
            background: var(--primary); color: white; padding: 10px 20px; 
            border-radius: 8px; border: none; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }

        /* البطاقات */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
        .stat-title { font-size: 14px; color: #666; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: bold; }
        
        /* الجدول */
        .table-container { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .toolbar { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: center; }
        .search-input { width: 100%; max-width: 400px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; outline: none; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9fafb; padding: 15px; text-align: right; font-size: 14px; color: #555; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge.active { background: #d1fae5; color: #065f46; }
        .badge.out { background: #fee2e2; color: #991b1b; }
        
        .action-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px; }

        /* النافذة المنبثقة */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 15px; position: relative; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 22px; cursor: pointer; color: #999; }
        .form-input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; display: block; }
        .save-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>جاري تحميل المنتجات...</p>
    </div>

    <div id="main-wrapper">
        <aside class="sidebar">
            <div class="logo-area"><h2>Wusooly Admin</h2></div>
            <ul class="nav-links">
                <a href="index.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    لوحة القيادة
                </a>
                <a href="products.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    المنتجات
                </a>
                <a href="#" class="nav-item" onclick="alert('قريباً')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    الطلبات
                </a>
            </ul>
            <div class="logout-area">
                <button class="logout-btn" onclick="logoutAdmin()">تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>إدارة المنتجات</h1>
                    <p>متابعة وتحديث المخزون</p>
                </div>
                <button class="add-btn" onclick="openModal()">+ نشر منتج جديد</button>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-title">خارج المخزون</div>
                    <div class="stat-value" id="count-out" style="color: #ef4444;">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">نشط حالياً</div>
                    <div class="stat-value" id="count-active" style="color: #10b981;">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">الإجمالي</div>
                    <div class="stat-value" id="count-total">0</div>
                </div>
            </div>

            <div class="table-container">
                <div class="toolbar">
                    <input type="text" id="search-box" class="search-input" placeholder="🔍 ابحث عن منتج باستخدام الـ ID...">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>المنتج</th>
                            <th>الفئة</th>
                            <th>السعر</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="product-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-header">إضافة منتج</h2>
            <input type="hidden" id="edit-id">
            
            <label>اسم المنتج</label>
            <input type="text" id="p-name" class="form-input" placeholder="اسم المنتج">
            
            <div style="display:flex; gap:10px;">
                <input type="number" id="p-price" class="form-input" placeholder="السعر">
                <input type="number" id="p-stock" class="form-input" placeholder="الكمية">
            </div>

            <label>الفئة</label>
            <select id="p-category" class="form-input">
                <option value="إلكترونيات">إلكترونيات</option>
                <option value="ملابس">ملابس</option>
                <option value="اكسسوارات">اكسسوارات</option>
            </select>

            <label>رابط الصورة</label>
            <input type="text" id="p-image" class="form-input" placeholder="https://...">

            <button class="save-btn" onclick="saveProduct()">حفظ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "hmamda320@gmail.com";
        let allProducts = [];

        // 1. فحص الدخول + إخفاء شاشة التحميل
        onAuthStateChanged(auth, (user) => {
            const loader = document.getElementById('loading-screen');
            const main = document.getElementById('main-wrapper');

            if (user && user.email === ADMIN_EMAIL) {
                main.style.display = 'block';
                loadProducts().then(() => {
                    loader.style.display = 'none'; // نخفي التحميل فقط بعد جلب البيانات
                });
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. تحميل المنتجات
        async function loadProducts() {
            try {
                const snapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                let active = 0, out = 0;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    d.id = doc.id;
                    allProducts.push(d);
                    if(Number(d.stock) > 0) active++; else out++;
                });

                document.getElementById('count-total').innerText = allProducts.length;
                document.getElementById('count-active').innerText = active;
                document.getElementById('count-out').innerText = out;

                renderTable(allProducts);
            } catch (error) {
                console.error(error);
                alert("حدث خطأ في تحميل البيانات، تأكد من اتصال الإنترنت.");
            }
        }

        // 3. عرض الجدول
        function renderTable(list) {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px;">لا توجد منتجات حالياً</td></tr>';
                return;
            }

            list.forEach(p => {
                const stock = Number(p.stock) || 0;
                const badge = stock > 0 ? `<span class="badge active">نشط</span>` : `<span class="badge out">نفذت</span>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${p.id.substring(0, 5)}</td>
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${p.image || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;">
                            <span>${p.name}</span>
                        </div>
                    </td>
                    <td>${p.category}</td>
                    <td>$${p.price}</td>
                    <td>${stock}</td>
                    <td>${badge}</td>
                    <td>
                        <button class="action-btn" onclick="editProduct('${p.id}')" style="color:blue;">✏️</button>
                        <button class="action-btn" onclick="deleteProduct('${p.id}')" style="color:red;">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 4. الدوال (مربوطة بـ window)
        window.openModal = () => {
            document.getElementById('product-modal').style.display = 'flex';
            document.getElementById('modal-header').innerText = "إضافة منتج";
            document.getElementById('edit-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-stock').value = "";
            document.getElementById('p-image').value = "";
        };
        window.closeModal = () => document.getElementById('product-modal').style.display = 'none';

        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                stock: Number(document.getElementById('p-stock').value),
                category: document.getElementById('p-category').value,
                image: document.getElementById('p-image').value,
                updatedAt: Date.now()
            };

            const btn = document.querySelector('.save-btn');
            btn.innerText = "جاري الحفظ...";

            try {
                if(id) await updateDoc(doc(db, "products", id), data);
                else {
                    data.createdAt = Date.now();
                    await addDoc(collection(db, "products"), data);
                }
                closeModal();
                loadProducts();
                btn.innerText = "حفظ";
            } catch (e) { 
                console.error(e); 
                btn.innerText = "خطأ!"; 
            }
        };

        window.editProduct = (id) => {
            const p = allProducts.find(x => x.id === id);
            if(p) {
                document.getElementById('product-modal').style.display = 'flex';
                document.getElementById('modal-header').innerText = "تعديل المنتج";
                document.getElementById('edit-id').value = id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('p-category').value = p.category;
                document.getElementById('p-image').value = p.image;
            }
        };

        window.deleteProduct = async (id) => {
            if(confirm("هل أنت متأكد من الحذف؟")) {
                await deleteDoc(doc(db, "products", id));
                loadProducts();
            }
        };

        window.logoutAdmin = () => signOut(auth).then(() => window.location.href = "login.html");

        document.getElementById('search-box').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.id.toLowerCase().includes(val));
            renderTable(filtered);
        });
    </script>
</body>
</html>
