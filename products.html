<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات - Wusooly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #5c6bc0; /* لون زر الإضافة البنفسجي */
            --bg-light: #f3f4f6;
            --white: #FFFFFF;
            --text-dark: #333;
            --sidebar-width: 280px;
            --sidebar-bg: #1e293b; 
            --sidebar-text: #cbd5e1;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); 
            margin: 0; 
            display: none; /* مخفي حتى التحقق */
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-dark); 
        }

        /* --- القائمة الجانبية (نفس index.html) --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--sidebar-bg);
            height: 100%; position: fixed; right: 0; top: 0;
            display: flex; flex-direction: column; color: var(--sidebar-text);
            padding-top: 20px; z-index: 100;
        }
        .logo-area { padding: 25px; text-align: center; border-bottom: 1px solid #334155; }
        .logo-area h2 { margin: 0; color: var(--white); }
        .nav-links { padding: 20px 15px; flex-grow: 1; list-style: none; margin: 0; }
        .nav-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px 20px; 
            margin-bottom: 8px; border-radius: 10px; cursor: pointer; 
            color: var(--sidebar-text); font-weight: 600; text-decoration: none; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #334155; color: var(--white); }
        .nav-item svg { width: 24px; height: 24px; }
        .logout-area { padding: 20px; border-top: 1px solid #334155; }
        .logout-btn { 
            width: 100%; padding: 12px; background: #ffebee; color: #d32f2f; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
        }

        /* --- المحتوى الرئيسي --- */
        .main-content {
            margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            height: 100%; overflow-y: auto; padding: 30px;
        }

        /* رأس الصفحة وزر الإضافة */
        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
        }
        .page-title h1 { margin: 0; font-size: 24px; color: #1f2937; }
        .page-title p { margin: 5px 0 0; color: #6b7280; font-size: 14px; }

        .add-btn {
            background-color: var(--primary); color: white;
            padding: 12px 24px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(92, 107, 192, 0.3); transition: 0.3s;
        }
        .add-btn:hover { background-color: #4a59a7; transform: translateY(-2px); }

        /* بطاقات الإحصائيات */
        .stats-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--white); padding: 20px; border-radius: var(--radius);
            box-shadow: var(--shadow); text-align: center;
        }
        .stat-title { color: #6b7280; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--primary); }
        .stat-card.danger .stat-value { color: #ef4444; } /* للأحمر */
        .stat-card.success .stat-value { color: #10b981; } /* للأخضر */

        /* منطقة البحث والجدول */
        .table-container {
            background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden;
        }
        .toolbar {
            padding: 20px; border-bottom: 1px solid #e5e7eb;
            display: flex; align-items: center;
        }
        .search-input {
            width: 100%; max-width: 400px; padding: 10px 15px;
            border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb;
            font-family: 'Cairo'; outline: none;
        }
        .search-input:focus { border-color: var(--primary); background: #fff; }

        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #f9fafb; color: #6b7280; font-weight: 700; 
            padding: 15px; text-align: right; font-size: 14px;
        }
        td { 
            padding: 15px; border-bottom: 1px solid #f3f4f6; 
            color: #374151; font-size: 14px; vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        
        .product-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #eee; }
        .product-name-cell { display: flex; align-items: center; gap: 10px; }
        
        /* حالة المنتج */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.active { background: #d1fae5; color: #065f46; }
        .badge.out { background: #fee2e2; color: #991b1b; }

        /* أزرار الإجراءات */
        .action-btn { 
            background: none; border: none; cursor: pointer; padding: 5px; 
            border-radius: 5px; transition: 0.2s;
        }
        .edit-icon { color: #3b82f6; } .edit-icon:hover { background: #eff6ff; }
        .del-icon { color: #ef4444; } .del-icon:hover { background: #fef2f2; }

        /* --- النافذة المنبثقة (Modal) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-box {
            background: white; width: 90%; max-width: 500px;
            padding: 30px; border-radius: 15px; position: relative;
        }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
        .close-modal { 
            position: absolute; top: 20px; left: 20px; font-size: 24px; cursor: pointer; color: #999; 
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 13px; color: #555; }
        .form-input { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; 
            font-family: 'Cairo';
        }
        .save-btn {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area"><h2>Wusooly Admin</h2></div>
        <ul class="nav-links">
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                لوحة القيادة
            </a>
            <a href="products.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                المنتجات
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                الطلبات
            </a>
        </ul>
        <div class="logout-area">
            <button class="logout-btn" onclick="logoutAdmin()">تسجيل الخروج</button>
        </div>
    </aside>

    <main class="main-content">
        
        <div class="page-header">
            <div class="page-title">
                <h1>إدارة المنتجات</h1>
                <p>إدارة وتحديث مخزون المنتجات الخاص بك</p>
            </div>
            <button class="add-btn" onclick="openModal()">
                <span>+</span> نشر منتج جديد
            </button>
        </div>

        <div class="stats-container">
            <div class="stat-card danger">
                <div class="stat-title">خارج المخزون</div>
                <div class="stat-value" id="count-out">0</div>
            </div>
            <div class="stat-card success">
                <div class="stat-title">منتجات نشطة</div>
                <div class="stat-value" id="count-active">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">إجمالي المنتجات</div>
                <div class="stat-value" id="count-total">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="toolbar">
                <input type="text" id="search-box" class="search-input" placeholder="🔍 البحث باستخدام معرف المنتج (ID)...">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>المنتج</th>
                        <th>الفئة</th>
                        <th>السعر</th>
                        <th>المخزون</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr><td colspan="7" style="text-align:center;">جاري تحميل المنتجات...</td></tr>
                </tbody>
            </table>
        </div>

    </main>

    <div id="product-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modal-header">إضافة منتج جديد 🛍️</div>
            
            <input type="hidden" id="edit-id"> <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="p-name" class="form-input" placeholder="اسم المنتج">
            </div>
            <div class="form-group" style="display:flex; gap:10px;">
                <div style="flex:1">
                    <label>السعر (₪)</label>
                    <input type="number" id="p-price" class="form-input" placeholder="0">
                </div>
                <div style="flex:1">
                    <label>الكمية</label>
                    <input type="number" id="p-stock" class="form-input" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label>الفئة</label>
                <select id="p-category" class="form-input">
                    <option value="إلكترونيات">إلكترونيات</option>
                    <option value="ملابس">ملابس</option>
                    <option value="اكسسوارات">اكسسوارات</option>
                    <option value="أحذية">أحذية</option>
                    <option value="شنط">شنط</option>
                </select>
            </div>
            <div class="form-group">
                <label>رابط الصورة</label>
                <input type="text" id="p-image" class="form-input" placeholder="https://...">
            </div>
            <button class="save-btn" onclick="saveProduct()">حفظ المنتج</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "hmamda320@gmail.com";

        let allProducts = []; // لتخزين المنتجات محلياً للبحث

        // التحقق الأمني
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.body.style.display = 'block';
                loadProducts();
            } else {
                window.location.href = "login.html";
            }
        });

        // 1. تحميل المنتجات وعرضها
        async function loadProducts() {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري التحديث...</td></tr>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                let activeCount = 0;
                let outStockCount = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    data.id = doc.id; // تخزين الـ ID مع البيانات
                    allProducts.push(data);
                    
                    if(Number(data.stock) > 0) activeCount++;
                    else outStockCount++;
                });

                // تحديث الإحصائيات العلوية
                document.getElementById('count-total').innerText = allProducts.length;
                document.getElementById('count-active').innerText = activeCount;
                document.getElementById('count-out').innerText = outStockCount;

                renderTable(allProducts);

            } catch (error) {
                console.error("Error:", error);
                tbody.innerHTML = '<tr><td colspan="7">حدث خطأ في تحميل البيانات</td></tr>';
            }
        }

        // 2. رسم الجدول
        function renderTable(products) {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '';

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد منتجات</td></tr>';
                return;
            }

            products.forEach(p => {
                const stock = Number(p.stock) || 0;
                const statusHtml = stock > 0 
                    ? `<span class="badge active">نشط ✅</span>` 
                    : `<span class="badge out">نفذت ⛔</span>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${p.id.substring(0, 5)}</td>
                    <td>
                        <div class="product-name-cell">
                            <img src="${p.image || 'https://via.placeholder.com/40'}" class="product-img">
                            <div>
                                <div style="font-weight:bold;">${p.name}</div>
                            </div>
                        </div>
                    </td>
                    <td>${p.category}</td>
                    <td><strong>$${p.price}</strong></td>
                    <td>${stock} وحدة</td>
                    <td>${statusHtml}</td>
                    <td>
                        <button class="action-btn edit-icon" onclick="editProduct('${p.id}')">✏️</button>
                        <button class="action-btn del-icon" onclick="deleteProduct('${p.id}')">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 3. البحث بالـ ID
        document.getElementById('search-box').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.id.toLowerCase().includes(val));
            renderTable(filtered);
        });

        // 4. فتح وإغلاق المودال
        window.openModal = () => {
            document.getElementById('product-modal').style.display = 'flex';
            document.getElementById('modal-header').innerText = "إضافة منتج جديد 🛍️";
            document.getElementById('edit-id').value = ""; // تفريغ ال ID
            // تفريغ الحقول
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-stock').value = "";
            document.getElementById('p-image').value = "";
        };
        window.closeModal = () => document.getElementById('product-modal').style.display = 'none';

        // 5. حفظ المنتج (إضافة أو تعديل)
        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;
            const category = document.getElementById('p-category').value;
            const image = document.getElementById('p-image').value;

            if(!name || !price) { alert("يرجى ملء الاسم والسعر"); return; }

            const btn = document.querySelector('.save-btn');
            btn.innerText = "جاري الحفظ...";

            const productData = {
                name: name,
                price: Number(price),
                stock: Number(stock),
                category: category,
                image: image,
                updatedAt: Date.now()
            };

            try {
                if (id) {
                    // تعديل
                    await updateDoc(doc(db, "products", id), productData);
                    alert("تم تعديل المنتج بنجاح ✅");
                } else {
                    // إضافة جديد
                    productData.createdAt = Date.now();
                    await addDoc(collection(db, "products"), productData);
                    alert("تم نشر المنتج بنجاح 🎉");
                }
                closeModal();
                loadProducts(); // إعادة تحميل الجدول
            } catch (error) {
                console.error(error);
                alert("حدث خطأ!");
            }
            btn.innerText = "حفظ المنتج";
        };

        // 6. زر التعديل (تعبئة المودال بالبيانات القديمة)
        window.editProduct = (id) => {
            const product = allProducts.find(p => p.id === id);
            if(product) {
                document.getElementById('modal-header').innerText = "تعديل المنتج ✏️";
                document.getElementById('edit-id').value = id;
                document.getElementById('p-name').value = product.name;
                document.getElementById('p-price').value = product.price;
                document.getElementById('p-stock').value = product.stock || 0;
                document.getElementById('p-category').value = product.category;
                document.getElementById('p-image').value = product.image;
                
                document.getElementById('product-modal').style.display = 'flex';
            }
        };

        // 7. حذف المنتج
        window.deleteProduct = async (id) => {
            if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
                try {
                    await deleteDoc(doc(db, "products", id));
                    loadProducts(); // تحديث الجدول
                } catch (error) {
                    alert("فشل الحذف");
                }
            }
        };

        window.logoutAdmin = () => {
            signOut(auth).then(() => window.location.href = "login.html");
        };
    </script>
</body>
</html>
