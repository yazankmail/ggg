<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة - Wusooly Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #0056b3; --secondary: #008489;
            --bg-light: #F4F6F8; --white: #FFFFFF;
            --text-dark: #333; --text-gray: #666;
            --sidebar-width: 260px;
            --shadow: 0 5px 15px rgba(0,0,0,0.05);
            --radius: 15px;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); 
            margin: 0; 
            display: none; /* مخفي افتراضياً للحماية */
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-dark); 
        }

        /* --- القائمة الجانبية (Sidebar) --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--white);
            height: 100%; position: fixed; right: 0; top: 0;
            border-left: 1px solid #eee; display: flex; flex-direction: column;
            transition: 0.3s ease; z-index: 1000;
        }
        
        .logo-area { padding: 25px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .logo-area h2 { margin: 0; color: var(--primary); font-weight: 800; }
        
        .nav-links { padding: 20px 10px; flex-grow: 1; list-style: none; margin: 0; }
        .nav-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            margin-bottom: 8px; border-radius: 10px; cursor: pointer; 
            color: var(--text-gray); font-weight: 600; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #e3f2fd; color: var(--primary); }
        .nav-item svg { width: 20px; height: 20px; }

        .logout-area { padding: 20px; border-top: 1px solid #f0f0f0; }
        .logout-btn { 
            width: 100%; padding: 12px; background: #ffebee; color: #d32f2f; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* --- المحتوى الرئيسي (Main Content) --- */
        .main-content {
            margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            height: 100%; overflow-y: auto; padding: 30px; transition: 0.3s;
        }

        /* الهيدر العلوي */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .welcome-text h1 { margin: 0; font-size: 24px; }
        .welcome-text p { margin: 5px 0 0; color: var(--text-gray); font-size: 14px; }
        
        .menu-toggle { display: none; background: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; box-shadow: var(--shadow); }

        /* --- بطاقات الإحصائيات --- */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-card {
            background: var(--white); padding: 25px; border-radius: var(--radius);
            box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card:nth-child(1) { border-color: #4CAF50; }
        .stat-card:nth-child(2) { border-color: #2196F3; }
        .stat-card:nth-child(3) { border-color: #FF9800; }
        .stat-card:nth-child(4) { border-color: #9C27B0; }

        .stat-info h3 { margin: 0; font-size: 28px; font-weight: 800; color: var(--text-dark); }
        .stat-info p { margin: 5px 0 0; color: var(--text-gray); font-size: 14px; }
        .stat-icon { 
            width: 50px; height: 50px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; 
        }
        
        /* --- الرسوم البيانية --- */
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--white); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .chart-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; font-size: 16px; }

        /* التجاوب */
        @media (max-width: 992px) {
            .charts-container { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { right: -280px; }
            .sidebar.active { right: 0; }
            .main-content { margin-right: 0; width: 100%; padding: 20px; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <h2>Wusooly Admin 🚀</h2>
        </div>
        
        <ul class="nav-links">
            <li class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                لوحة القيادة
            </li>
            
            <li class="nav-item" onclick="alert('قسم المنتجات (قادم قريباً)')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                المنتجات
            </li>
            
            <li class="nav-item" onclick="alert('قسم الطلبات (قادم قريباً)')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                الطلبات
            </li>

            <li class="nav-item" onclick="alert('قسم المستخدمين (قادم قريباً)')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                المستخدمين
            </li>
        </ul>

        <div class="logout-area">
            <button class="logout-btn" onclick="logoutAdmin()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                تسجيل الخروج
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <div class="welcome-text">
                <h1 id="admin-name">أهلاً بك 👋</h1>
                <p>إليك نظرة عامة على أداء متجرك اليوم</p>
            </div>
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3 id="stat-visitors">0</h3>
                    <p>زوار اليوم</p>
                </div>
                <div class="stat-icon" style="background: #e8f5e9; color: #4CAF50;">👁️</div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3 id="stat-sales">0</h3>
                    <p>إجمالي الطلبات</p>
                </div>
                <div class="stat-icon" style="background: #e3f2fd; color: #2196F3;">📦</div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>0</h3>
                    <p>الطلبات الجديدة</p>
                </div>
                <div class="stat-icon" style="background: #fff3e0; color: #FF9800;">🔔</div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3 id="stat-revenue">₪ 0</h3>
                    <p>الإيرادات</p>
                </div>
                <div class="stat-icon" style="background: #f3e5f5; color: #9C27B0;">💰</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-header"><span>تحليل الزوار 📈</span></div>
                <canvas id="visitorsChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-header"><span>توزيع المبيعات 🛍️</span></div>
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_EMAIL = "hmamda320@gmail.com";

        // التحقق الأمني الصارم
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                // المستخدم هو الأدمن -> إظهار الصفحة
                document.body.style.display = 'block';
                document.getElementById('admin-name').innerText = "أهلاً، " + user.displayName.split(' ')[0] + " 👋";
            } else {
                // إذا لم يكن مسجلاً أو لم يكن الأدمن -> توجيه فوري لصفحة الدخول
                window.location.href = "login.html";
            }
        });

        window.logoutAdmin = () => {
            signOut(auth).then(() => window.location.href = "login.html");
        };

        // إعداد الرسوم البيانية (بيانات وهمية حالياً)
        const ctx1 = document.getElementById('visitorsChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
                datasets: [{
                    label: 'الزيارات',
                    data: [12, 19, 3, 5, 2, 3, 20],
                    borderColor: '#0056b3',
                    backgroundColor: 'rgba(0, 86, 179, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        const ctx2 = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['ملابس', 'هدايا', 'اكسسوارات'],
                datasets: [{
                    data: [55, 25, 20],
                    backgroundColor: ['#0056b3', '#008489', '#FF9800'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true }
        });

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
