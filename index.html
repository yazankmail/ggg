<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص لوحة التحكم</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; direction: rtl; }
        .status-box { 
            background: #f4f4f4; border: 2px solid #333; padding: 20px; 
            margin: 20px auto; max-width: 600px; border-radius: 10px;
            font-size: 18px; line-height: 1.6;
        }
        .success { color: green; border-color: green; background: #e8f5e9; }
        .error { color: red; border-color: red; background: #ffebee; }
        .btn {
            background: #0056b3; color: white; padding: 10px 20px; 
            text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🕵️ فحص الدخول للوحة التحكم</h1>
    <div id="status" class="status-box">جاري الاتصال بـ Firebase... ⏳</div>
    
    <div id="dashboard-preview" style="display:none;">
        <h2>🎉 تم التعرف عليك بنجاح!</h2>
        <p>المشكلة كانت في كود التحويل السابق، الآن النظام يراك بشكل صحيح.</p>
        <p>هذا يعني أننا جاهزون لوضع الكود الأصلي.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // تأكد من كتابة الإيميل بالأحرف الصغيرة
        const ADMIN_EMAIL = "hmamda320@gmail.com".toLowerCase();
        const statusDiv = document.getElementById('status');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 1. المستخدم موجود
                const userEmail = user.email.toLowerCase();
                
                statusDiv.innerHTML = `
                    <strong>✅ تم العثور على مستخدم!</strong><br>
                    الإيميل المسجل: <code>${userEmail}</code><br>
                    الإيميل المطلوب: <code>${ADMIN_EMAIL}</code>
                `;

                if (userEmail === ADMIN_EMAIL) {
                    // 2. الإيميل مطابق
                    statusDiv.classList.add('success');
                    statusDiv.innerHTML += `<br><br><strong>✨ النتيجة: مطابق! أنت الأدمن.</strong>`;
                    document.getElementById('dashboard-preview').style.display = 'block';
                } else {
                    // 3. الإيميل غير مطابق
                    statusDiv.classList.add('error');
                    statusDiv.innerHTML += `<br><br><strong>⛔ النتيجة: غير مطابق!</strong><br>أنت مسجل دخول بحساب ليس له صلاحية.`;
                }

            } else {
                // 4. لا يوجد مستخدم (فقدان الجلسة)
                statusDiv.classList.add('error');
                statusDiv.innerHTML = `
                    <strong>❌ لا يوجد مستخدم مسجل دخول!</strong><br>
                    يبدو أن المتصفح فقد بيانات الدخول عند الانتقال من صفحة Login إلى Index.<br>
                    <a href="login.html" class="btn">العودة لتسجيل الدخول</a>
                `;
            }
        });
    </script>
</body>
</html>
