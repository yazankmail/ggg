<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة - Wusooly Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #0056b3; --bg-light: #F4F6F8; --white: #FFFFFF;
            --text-dark: #333; --sidebar-width: 260px;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light); margin: 0; 
            height: 100vh; overflow: hidden; color: var(--text-dark); 
        }

        /* شاشة التحميل */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #eee;
            border-top: 5px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* المحتوى المخفي */
        #dashboard-content { display: none; height: 100%; }

        /* القائمة الجانبية */
        .sidebar {
            width: var(--sidebar-width); background: var(--white);
            height: 100%; position: fixed; right: 0; top: 0;
            border-left: 1px solid #eee; display: flex; flex-direction: column;
        }
        .logo-area { padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-area h2 { margin: 0; color: var(--primary); }
        
        .nav-links { list-style: none; padding: 20px 10px; margin: 0; flex-grow: 1; }
        
        /* تنسيق الروابط */
        .nav-item { 
            padding: 12px 20px; border-radius: 10px; cursor: pointer; 
            display: flex; align-items: center; gap: 10px; 
            color: #666; margin-bottom: 5px; text-decoration: none; font-weight: 600;
            transition: 0.2s;
        }
        .nav-item.active, .nav-item:hover { background: #e3f2fd; color: var(--primary); }
        .nav-item svg { width: 22px; height: 22px; }

        .logout-area { padding: 20px; border-top: 1px solid #eee; }
        .logout-btn { width: 100%; padding: 12px; background: #ffebee; color: #d32f2f; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* المحتوى الرئيسي */
        .main-content { margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); height: 100%; overflow-y: auto; padding: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 28px; }
        .stat-card p { margin: 5px 0 0; color: #777; font-size: 14px; }

        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>جاري التحقق من الصلاحيات...</p>
    </div>

    <div id="dashboard-content">
        <aside class="sidebar">
            <div class="logo-area"><h2>Admin Panel 🚀</h2></div>
            <div class="nav-links">
                <a href="index.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    لوحة القيادة
                </a>

                <a href="products.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    المنتجات
                </a>

                <a href="#" class="nav-item" onclick="alert('قريباً')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    المستخدمين
                </a>
            </div>
            <div class="logout-area">
                <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 id="welcome-msg">أهلاً بك 👋</h1>
            
            <div class="stats-grid">
                <div class="stat-card"><h3>124</h3><p>الزوار</p></div>
                <div class="stat-card"><h3>35</h3><p>الطلبات</p></div>
                <div class="stat-card"><h3>₪1,200</h3><p>الأرباح</p></div>
                <div class="stat-card"><h3>5</h3><p>تنبيهات</p></div>
            </div>

            <div class="charts-container">
                <div class="chart-box"><canvas id="chart1"></canvas></div>
                <div class="chart-box"><canvas id="chart2"></canvas></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const ADMIN_EMAIL = "hmamda320@gmail.com";

        onAuthStateChanged(auth, (user) => {
            const loading = document.getElementById('loading-screen');
            
            if (user) {
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('welcome-msg').innerText = `أهلاً، ${user.displayName.split(' ')[0]} 👋`;
                    loading.style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'block';
                } else {
                    alert("غير مصرح لك!");
                    signOut(auth).then(() => window.location.href = "login.html");
                }
            } else {
                window.location.href = "login.html";
            }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");

        // الرسوم البيانية
        new Chart(document.getElementById('chart1'), {
            type: 'line',
            data: { labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'], datasets: [{ label: 'Visitors', data: [10, 20, 15, 30, 25, 40, 35], borderColor: '#0056b3', fill: true }] }
        });
        new Chart(document.getElementById('chart2'), {
            type: 'doughnut',
            data: { labels: ['A', 'B', 'C'], datasets: [{ data: [30, 50, 20], backgroundColor: ['#0056b3', '#008489', '#FF9800'] }] }
        });
    </script>
</body>
</html>
