<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة - Wusooly Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        :root { --primary: #0056b3; --bg: #F4F6F8; --dark: #1e293b; --text-light: #cbd5e1; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; display:flex; height: 100vh; overflow: hidden; }
        
        /* القائمة الجانبية */
        .sidebar { width: 260px; background: var(--dark); color: var(--text-light); display: flex; flex-direction: column; padding: 20px 0; }
        .logo { text-align: center; font-size: 24px; font-weight: bold; color: white; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .nav-links { list-style: none; padding: 0 10px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 15px; color: var(--text-light); text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: #334155; color: white; }
        .logout { padding: 0 20px; }
        .logout-btn { width: 100%; padding: 12px; background: #ffebee; color: #d32f2f; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* المحتوى */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: none; /* مخفي حتى التحميل */ }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { margin: 0; font-size: 28px; color: #333; }
        .card p { margin: 5px 0 0; color: #777; font-size: 14px; }
        .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* شاشة التحميل */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p>جاري التحميل...</p></div>

    <aside class="sidebar">
        <div class="logo">Wusooly Admin</div>
        <div class="nav-links">
            <a href="index.html" class="nav-item active">🏠 لوحة القيادة</a>
            <a href="products.html" class="nav-item">📦 المنتجات</a>
            <a href="#" class="nav-item" onclick="alert('قريباً')">👥 المستخدمين</a>
        </div>
        <div class="logout"><button class="logout-btn" onclick="logout()">تسجيل خروج</button></div>
    </aside>

    <main class="main" id="main-content">
        <div class="header">
            <h1 id="welcome">أهلاً بك</h1>
        </div>
        
        <div class="cards">
            <div class="card"><h3>1,200</h3><p>الزوار</p></div>
            <div class="card"><h3>350</h3><p>الطلبات</p></div>
            <div class="card"><h3>₪ 5,400</h3><p>الأرباح</p></div>
        </div>

        <div class="charts">
            <div class="chart-box"><canvas id="c1"></canvas></div>
            <div class="chart-box"><canvas id="c2"></canvas></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY", authDomain: "wusooly-1906b.firebaseapp.com", projectId: "wusooly-1906b", storageBucket: "wusooly-1906b.firebasestorage.app", messagingSenderId: "95836343161", appId: "1:95836343161:web:73ae3faaca406c0bf7fda8" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const ADMIN = "hmamda320@gmail.com";

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN) {
                document.getElementById('welcome').innerText = `أهلاً، ${user.displayName.split(' ')[0]}`;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                window.location.href = "login.html";
            }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");

        new Chart(document.getElementById('c1'), { type: 'line', data: { labels: ['S','M','T','W','T','F'], datasets: [{ label: 'الزوار', data: [10,20,15,30,25,40], borderColor: '#0056b3' }] } });
        new Chart(document.getElementById('c2'), { type: 'doughnut', data: { labels: ['A','B','C'], datasets: [{ data: [30,50,20], backgroundColor: ['#0056b3','#008489','#FF9800'] }] } });
    </script>
</body>
</html>
