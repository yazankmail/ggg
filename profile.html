<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول المدير - Wusooly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000; /* لون احتياطي */
        }

        /* الخلفية المخصصة */
        .bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.ibb.co/8LVbzyP2/1770038717427.png') no-repeat center center;
            background-size: cover; /* لملء الشاشة بالكامل */
            z-index: -1;
            filter: brightness(0.6); /* تعتيم بسيط لإبراز النص */
        }

        /* بطاقة الزجاج (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: #fff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { margin-top: 0; margin-bottom: 10px; font-weight: 800; font-size: 28px; }
        p { margin-bottom: 30px; color: rgba(255, 255, 255, 0.8); font-size: 14px; }

        .input-group { margin-bottom: 20px; position: relative; text-align: right; }
        
        .input-field {
            width: 100%;
            padding: 15px 20px; /* مسافة للأيقونة */
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-field::placeholder { color: rgba(255, 255, 255, 0.6); }
        .input-field:focus { border-color: #4dabf7; background: rgba(255, 255, 255, 0.2); }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0056b3, #004494);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.4);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 86, 179, 0.6); }

        .divider { margin: 25px 0; font-size: 14px; color: rgba(255,255,255,0.5); position: relative; }
        .divider::before, .divider::after {
            content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.2);
        }
        .divider::before { left: 0; } .divider::after { right: 0; }

        .google-btn {
            background: white; color: #333;
            width: 100%; padding: 12px;
            border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .google-btn:hover { background: #f1f1f1; transform: scale(1.02); }

        .footer-text { margin-top: 25px; font-size: 12px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="glass-card">
        <h2>أهلاً بك 👋</h2>
        <p>يرجى تسجيل الدخول للوصول إلى لوحة التحكم</p>

        <div class="input-group">
            <input type="email" class="input-field" placeholder="اسم المستخدم أو الإيميل">
        </div>
        <div class="input-group">
            <input type="password" class="input-field" placeholder="كلمة المرور">
        </div>

        <button class="login-btn" onclick="alert('يرجى استخدام زر جوجل للدخول كمسؤول')">تسجيل الدخول</button>

        <div class="divider">أو</div>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            الدخول كمسؤول (Google)
        </button>

        <div class="footer-text">Wusooly Admin Panel &copy; 2026</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 🔒 الإيميل الوحيد المسموح له بالدخول
        const ALLOWED_ADMIN = "hmamda320@gmail.com";

        document.getElementById('google-login-btn').addEventListener('click', () => {
            const btn = document.getElementById('google-login-btn');
            btn.innerText = "جاري التحقق...";
            
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    
                    // التحقق الأمني
                    if (user.email === ALLOWED_ADMIN) {
                        // نجاح: توجيه للوحة التحكم
                        window.location.href = "admin.html";
                    } else {
                        // فشل: طرد المستخدم وتسجيل خروجه
                        alert("⛔ عذراً! هذا الحساب لا يملك صلاحيات المسؤول.");
                        signOut(auth);
                        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> الدخول كمسؤول (Google)';
                    }
                })
                .catch((error) => {
                    console.error(error);
                    alert("حدث خطأ في التسجيل: " + error.message);
                    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> الدخول كمسؤول (Google)';
                });
        });
    </script>

</body>
</html>
